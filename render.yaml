services:
  - type: web
    name: munchen-barber
    env: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    disk:
      name: barber-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: ADMIN_PASSWORD
        value: barber123
      - key: N8N_WEBHOOK
        value: https://usteem.app.n8n.cloud/webhook-test/barber-booking
      - key: TELEGRAM_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
