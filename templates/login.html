<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anmelden — München Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #FFFFFF;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-top: 2px solid #111111;
      border-radius: 4px;
      padding: 2.8rem 2.4rem 2.4rem;
      position: relative;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .auth-card::after { display: none; }
    .auth-corner-br { display: none; }
    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logomark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 1.5px solid #E5E5E5;
      border-radius: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #111111;
      background: #F5F4F2;
      margin-bottom: .9rem;
    }
    .auth-logomark::before { display: none; }
    .auth-site-name {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      letter-spacing: 3px;
      color: rgba(17,17,17,.35);
      text-transform: uppercase;
    }
    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: #111111;
      text-align: center;
      margin-bottom: .4rem;
      line-height: 1.2;
    }
    .auth-sub {
      font-size: .78rem;
      color: rgba(17,17,17,.4);
      text-align: center;
      margin-bottom: 2rem;
      font-family: 'DM Mono', monospace;
    }
    .auth-sep {
      height: 1px;
      background: #E5E5E5;
      margin-bottom: 1.8rem;
    }
    .auth-field { margin-bottom: 1.1rem; }
    .auth-field label {
      display: block;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(17,17,17,.45);
      margin-bottom: .45rem;
      font-family: 'DM Mono', monospace;
    }
    .auth-field input {
      width: 100%;
      background: #FAFAFA;
      border: 1px solid #E5E5E5;
      border-radius: 6px;
      padding: .8rem 1rem;
      color: #111111;
      font-family: 'Figtree', sans-serif;
      font-size: .9rem;
      transition: border-color .3s, box-shadow .3s;
      outline: none;
    }
    .auth-field input:focus {
      border-color: #111111;
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(17,17,17,.07);
    }
    .auth-field input::placeholder { color: rgba(17,17,17,.28); }
    .auth-btn {
      width: 100%;
      margin-top: 1.4rem;
      padding: .9rem 1.5rem;
      background: #111111;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      font-family: 'Figtree', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s, transform .25s;
    }
    .auth-btn:hover { background: #333333; transform: translateY(-1px); }
    .auth-btn:active { transform: translateY(0); }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .auth-err {
      display: none;
      background: rgba(220,38,38,.06);
      border: 1px solid rgba(220,38,38,.25);
      border-left: 3px solid #dc2626;
      border-radius: 6px;
      padding: .7rem 1rem;
      font-size: .8rem;
      color: #dc2626;
      margin-top: 1rem;
    }
    .auth-err.show { display: block; }
    .auth-links {
      text-align: center;
      margin-top: 1.6rem;
      font-size: .8rem;
      color: rgba(17,17,17,.38);
    }
    .auth-links a {
      color: #111111;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity .2s;
    }
    .auth-links a:hover { opacity: .6; }
    .auth-back {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      font-size: .68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(17,17,17,.35);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: color .2s;
      margin-bottom: 2rem;
    }
    .auth-back:hover { color: #111111; }
    .auth-back-wrap { text-align: center; }
  </style>
</head>
<body>
<div class="auth-page">
  <div style="width:100%;max-width:420px">

    <div class="auth-back-wrap">
      <a href="/" class="auth-back">← München Barber</a>
    </div>

    <div class="auth-card">
      <div class="auth-corner-br"></div>

      <div class="auth-logo">
        <div class="auth-logomark">MB</div>
        <div class="auth-site-name">München Barber</div>
      </div>

      <h1 class="auth-title">Willkommen zurück</h1>
      <p class="auth-sub">> Melde dich an, um zu buchen</p>
      <div class="auth-sep"></div>

      <form id="loginForm" novalidate>
        <div class="auth-field">
          <label>Telefonnummer</label>
          <input type="tel" id="lPhone" placeholder="+49 123 456 7890" autocomplete="tel" required>
        </div>
        <div class="auth-field">
          <label>Passwort</label>
          <input type="password" id="lPass" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="auth-btn" id="loginBtn">Anmelden ✂</button>
        <div class="auth-err" id="loginErr"></div>
      </form>

      <div class="auth-links">
        Noch kein Konto? <a href="/register">Jetzt registrieren →</a>
      </div>
    </div>
  </div>
</div>

<script>
  const next = new URLSearchParams(location.search).get('next') || '/';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginErr');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Wird geprüft...';

    try {
      const res  = await fetch('/api/client/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone:    document.getElementById('lPhone').value.trim(),
          password: document.getElementById('lPass').value,
        }),
      });
      const data = await res.json();
      if (data.success) {
        location.href = next.startsWith('/') ? next : '/';
      } else {
        err.textContent = '⚠ ' + data.error;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Anmelden ✂';
      }
    } catch {
      err.textContent = '⚠ Verbindungsfehler — bitte erneut versuchen';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Anmelden ✂';
    }
  });
</script>
</body>
</html>
