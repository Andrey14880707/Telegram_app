<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BarberShop — Панель управления</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --card: #1e1e1e; --border: #2a2a2a;
      --gold: #c9a227; --gold2: #e8c060; --text: #f0f0f0; --muted: #888;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
      --radius: 10px;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 14px; }

    /* ── Login Screen ── */
    .login-screen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: radial-gradient(ellipse at center, #1a1400 0%, #0d0d0d 70%);
    }
    .login-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 3rem 2.5rem; width: 360px; text-align: center;
      box-shadow: 0 0 60px rgba(201,162,39,0.1);
    }
    .login-box .logo { font-size: 2rem; font-weight: 700; letter-spacing: 2px; margin-bottom: 0.5rem; }
    .login-box .logo span { color: var(--gold); }
    .login-box p { color: var(--muted); margin-bottom: 2rem; font-size: 0.85rem; }
    .login-box input {
      width: 100%; padding: 0.85rem 1rem; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 1rem; outline: none; margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-error { color: var(--red); font-size: 0.8rem; margin-bottom: 0.8rem; display: none; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.6rem 1.2rem; border: none; border-radius: var(--radius);
      cursor: pointer; font-family: inherit; font-size: 0.85rem; font-weight: 500;
      transition: all 0.2s; text-decoration: none;
    }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:hover { background: var(--gold2); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.75rem; }
    .btn-full { width: 100%; }
    .btn-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-green:hover { background: var(--green); color: #000; }
    .btn-red { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-red:hover { background: var(--red); color: #fff; }
    .btn-blue { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
    .btn-blue:hover { background: var(--blue); color: #fff; }

    /* ── Layout ── */
    .dashboard { display: none; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    .dash-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0.8rem 1.5rem; display: flex; align-items: center; gap: 1rem;
      position: sticky; top: 0; z-index: 100;
    }
    .dash-logo { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
    .dash-logo span { color: var(--gold); }
    .dash-clock { color: var(--gold); font-weight: 600; font-size: 1rem; font-family: monospace; }
    .dash-date { color: var(--muted); font-size: 0.8rem; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .dash-badge { background: rgba(201,162,39,0.15); color: var(--gold); border: 1px solid rgba(201,162,39,0.3); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; }

    /* ── Stats ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; padding: 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; }
    .stat-card .s-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    .stat-card .s-val { font-size: 1.8rem; font-weight: 700; margin-top: 0.3rem; }
    .stat-card .s-val.gold { color: var(--gold); }
    .stat-card .s-val.green { color: var(--green); }
    .stat-card .s-val.yellow { color: var(--yellow); }

    /* ── Filters ── */
    .filters {
      padding: 1rem 1.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem;
      align-items: center; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .filters input, .filters select {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem 0.9rem; border-radius: var(--radius); font-family: inherit; font-size: 0.85rem;
      outline: none; transition: border-color 0.2s;
    }
    .filters input:focus, .filters select:focus { border-color: var(--gold); }
    .filter-search { width: 200px; }
    .filters-right { margin-left: auto; display: flex; gap: 0.5rem; }
    .refresh-info { color: var(--muted); font-size: 0.75rem; align-self: center; }

    /* ── Table ── */
    .table-wrap { flex: 1; overflow: auto; padding: 1.5rem; }
    .records-count { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.8rem; }

    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    thead tr { background: var(--card); }
    th { padding: 0.75rem 1rem; text-align: left; font-size: 0.75rem; text-transform: uppercase;
         letter-spacing: 1px; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block; padding: 0.25rem 0.7rem; border-radius: 20px; font-size: 0.72rem; font-weight: 500;
    }
    .badge-pending { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .badge-confirmed { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .badge-cancelled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }

    .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .client-name { font-weight: 500; color: var(--text); }
    .client-phone { color: var(--muted); font-size: 0.82rem; }
    .service-name { font-weight: 500; }
    .price-val { color: var(--gold); font-weight: 600; }
    .datetime-val { white-space: nowrap; }
    .datetime-date { font-weight: 500; }
    .datetime-time { color: var(--muted); font-size: 0.82rem; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 4rem; color: var(--muted); }
    .empty-state .e-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; }

    /* ── Loading ── */
    .loading-row td { text-align: center; padding: 3rem; color: var(--muted); }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
               border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 0.9rem 1.4rem; font-size: 0.85rem; transform: translateY(100px);
      opacity: 0; transition: all 0.3s; z-index: 9999; max-width: 320px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); padding: 1rem; }
      .filters { padding: 0.8rem 1rem; }
      .filter-search { width: 140px; }
      .table-wrap { padding: 0.8rem; }
      .dash-date { display: none; }
      .filters-right { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="logo">✂ BARBER<span>SHOP</span></div>
    <p>Панель управления</p>
    <input type="password" id="pwdInput" placeholder="Введите пароль"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError">Неверный пароль</div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">Войти</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="dashboard" id="dashboard">

  <!-- Header -->
  <div class="dash-header">
    <div class="dash-logo">✂ BARBER<span>SHOP</span></div>
    <div>
      <div class="dash-clock" id="admClock">—</div>
      <div class="dash-date" id="admDate">—</div>
    </div>
    <div class="header-right">
      <span class="dash-badge">Администратор</span>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Выйти</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="s-label">Сегодня</div><div class="s-val gold" id="sStat-today">—</div></div>
    <div class="stat-card"><div class="s-label">За неделю</div><div class="s-val" id="sStat-week">—</div></div>
    <div class="stat-card"><div class="s-label">Всего записей</div><div class="s-val" id="sStat-total">—</div></div>
    <div class="stat-card"><div class="s-label">Ожидают</div><div class="s-val yellow" id="sStat-pending">—</div></div>
    <div class="stat-card"><div class="s-label">Выручка сегодня</div><div class="s-val green" id="sStat-rev-today">—</div></div>
    <div class="stat-card"><div class="s-label">Выручка за месяц</div><div class="s-val green" id="sStat-rev-month">—</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input class="filter-search" type="text" id="fSearch" placeholder="🔍 Поиск по имени/телефону" oninput="debounceLoad()">
    <input type="date" id="fDate" onchange="loadAppointments()">
    <select id="fStatus" onchange="loadAppointments()">
      <option value="">Все статусы</option>
      <option value="pending">Ожидают</option>
      <option value="confirmed">Подтверждены</option>
      <option value="cancelled">Отменены</option>
    </select>
    <button class="btn btn-ghost btn-sm" onclick="clearFilters()">Сбросить</button>
    <span class="refresh-info" id="refreshInfo">—</span>
    <div class="filters-right">
      <button class="btn btn-ghost btn-sm" onclick="loadAppointments()">↻ Обновить</button>
      <a class="btn btn-ghost btn-sm" href="/api/admin/export" target="_blank">⬇ CSV</a>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="records-count" id="recordsCount"></div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Клиент</th>
          <th>Услуга</th>
          <th>Цена</th>
          <th>Дата / Время</th>
          <th>Контакты</th>
          <th>Статус</th>
          <th>Действия</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="loading-row"><td colspan="8"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Auth ────────────────────────────────────────────────────────────────────

async function checkAuth() {
  const r = await fetch('/api/admin/check');
  const d = await r.json();
  if (d.authenticated) showDashboard();
}

async function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  const r = await fetch('/api/admin/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({password: pwd})
  });
  const d = await r.json();
  if (d.success) {
    showDashboard();
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('pwdInput').value = '';
  }
}

async function doLogout() {
  await fetch('/api/admin/logout', {method:'POST'});
  location.reload();
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  loadStats();
  loadAppointments();
  startClock();
  setInterval(() => { loadStats(); loadAppointments(); }, 30000);
}

// ── Clock ───────────────────────────────────────────────────────────────────

function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('admClock').textContent = now.toLocaleTimeString('ru-RU');
    const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    document.getElementById('admDate').textContent =
      `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);
}

// ── Stats ───────────────────────────────────────────────────────────────────

async function loadStats() {
  const r = await fetch('/api/admin/stats');
  if (!r.ok) return;
  const d = await r.json();
  document.getElementById('sStat-today').textContent = d.today;
  document.getElementById('sStat-week').textContent = d.week;
  document.getElementById('sStat-total').textContent = d.total;
  document.getElementById('sStat-pending').textContent = d.pending;
  document.getElementById('sStat-rev-today').textContent = d.revenue_today.toLocaleString('ru') + '₽';
  document.getElementById('sStat-rev-month').textContent = d.revenue_month.toLocaleString('ru') + '₽';
}

// ── Appointments ─────────────────────────────────────────────────────────────

let debounceTimer;
function debounceLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadAppointments, 400); }

async function loadAppointments() {
  const search = document.getElementById('fSearch').value;
  const date = document.getElementById('fDate').value;
  const status = document.getElementById('fStatus').value;
  const params = new URLSearchParams();
  if (search) params.set('search', search);
  if (date) params.set('date', date);
  if (status) params.set('status', status);

  const body = document.getElementById('tableBody');
  body.innerHTML = '<tr class="loading-row"><td colspan="8"><div class="spinner"></div></td></tr>';

  const r = await fetch('/api/admin/appointments?' + params);
  if (!r.ok) return;
  const d = await r.json();
  renderTable(d.appointments);

  const now = new Date();
  document.getElementById('refreshInfo').textContent =
    `Обновлено в ${now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'})}`;
}

function renderTable(list) {
  const body = document.getElementById('tableBody');
  document.getElementById('recordsCount').textContent =
    list.length ? `Найдено: ${list.length} записей` : '';

  if (!list.length) {
    body.innerHTML = `<tr><td colspan="8">
      <div class="empty-state"><div class="e-icon">📋</div><p>Записей не найдено</p></div>
    </td></tr>`;
    return;
  }

  body.innerHTML = list.map(a => {
    const badge = {
      pending: '<span class="badge badge-pending">Ожидает</span>',
      confirmed: '<span class="badge badge-confirmed">Подтверждена</span>',
      cancelled: '<span class="badge badge-cancelled">Отменена</span>'
    }[a.status] || a.status;

    const actions = [];
    if (a.status === 'pending') {
      actions.push(`<button class="btn btn-sm btn-green" onclick="updateStatus(${a.id},'confirmed')">✓ Принять</button>`);
      actions.push(`<button class="btn btn-sm btn-red" onclick="updateStatus(${a.id},'cancelled')">✕ Отменить</button>`);
    }
    if (a.status === 'confirmed') {
      actions.push(`<button class="btn btn-sm btn-red" onclick="updateStatus(${a.id},'cancelled')">✕ Отменить</button>`);
    }
    if (a.status !== 'cancelled') {
      actions.push(`<button class="btn btn-sm btn-blue" onclick="sendRemind(${a.id})">📱 Напомнить</button>`);
    }

    const contacts = [
      a.phone ? `<div>${a.phone}</div>` : '',
      a.email ? `<div style="color:var(--muted);font-size:0.78rem">${a.email}</div>` : '',
      a.telegram ? `<div style="color:var(--muted);font-size:0.78rem">${a.telegram}</div>` : '',
    ].join('');

    return `<tr>
      <td style="color:var(--muted)">${a.id}</td>
      <td><div class="client-name">${esc(a.name)}</div></td>
      <td><div class="service-name">${esc(a.service)}</div></td>
      <td><span class="price-val">${a.price}₽</span></td>
      <td class="datetime-val">
        <div class="datetime-date">${a.date}</div>
        <div class="datetime-time">${a.time}</div>
      </td>
      <td>${contacts || '<span style="color:var(--muted)">—</span>'}</td>
      <td>${badge}</td>
      <td><div class="actions">${actions.join('')}</div></td>
    </tr>`;
  }).join('');
}

// ── Actions ──────────────────────────────────────────────────────────────────

async function updateStatus(id, status) {
  const labels = {confirmed: 'подтверждена', cancelled: 'отменена'};
  const r = await fetch(`/api/admin/appointments/${id}`, {
    method: 'PATCH', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  const d = await r.json();
  if (d.success) {
    toast(`✓ Запись ${labels[status] || status}`, 'success');
    loadAppointments(); loadStats();
  } else {
    toast('Ошибка обновления', 'error');
  }
}

async function sendRemind(id) {
  const r = await fetch(`/api/admin/remind/${id}`, {method:'POST'});
  const d = await r.json();
  toast(d.message || (d.success ? '✓ Напоминание отправлено' : '✕ Ошибка'), d.success ? 'success' : 'error');
}

function clearFilters() {
  document.getElementById('fSearch').value = '';
  document.getElementById('fDate').value = '';
  document.getElementById('fStatus').value = '';
  loadAppointments();
}

// ── Utils ────────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Init ─────────────────────────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
