<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>München Barber — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090909; --dark: #0f0f0f; --surface: #141414; --card: #191919;
      --border: #1f1f1f; --border2: #2a2a2a;
      --gold: #D4AF37; --gold2: #F0CC5A;
      --text: #f0f0f0; --gray: #888; --gray2: #555;
      --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
      --tr: .25s ease;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; font-size: 14px; }

    /* ── Login ── */
    .login {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% -20%, rgba(212,175,55,.1) 0%, transparent 60%);
    }
    .login-box {
      width: 360px; padding: 3rem 2.5rem;
      background: var(--card); border: 1px solid var(--border);
      text-align: center;
    }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 4px; color: var(--gold); margin-bottom: .25rem; }
    .login-sub { font-size: .75rem; color: var(--gray); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2.5rem; }
    .login-box input {
      width: 100%; padding: .85rem 1rem; margin-bottom: 1rem;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: inherit; font-size: .95rem; outline: none;
      transition: border-color var(--tr);
    }
    .login-box input:focus { border-color: var(--gold); }
    .login-err { color: var(--red); font-size: .78rem; margin-bottom: .75rem; display: none; }

    /* ── Buttons ── */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border: none; cursor: pointer; font-family: inherit; font-size: .8rem; font-weight: 500; transition: all var(--tr); text-decoration: none; white-space: nowrap; }
    .btn-gold { background: var(--gold); color: #000; font-weight: 600; letter-spacing: .5px; }
    .btn-gold:hover { background: var(--gold2); }
    .btn-full { width: 100%; justify-content: center; padding: .9rem; font-size: .85rem; }
    .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--gray); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .btn-green { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
    .btn-green:hover { background: var(--green); color: #000; }
    .btn-red   { background: rgba(239,68,68,.1);  color: var(--red);   border: 1px solid rgba(239,68,68,.2); }
    .btn-red:hover   { background: var(--red);   color: #fff; }
    .btn-blue  { background: rgba(59,130,246,.12); color: var(--blue); border: 1px solid rgba(59,130,246,.25); }
    .btn-blue:hover  { background: var(--blue);  color: #fff; }
    .btn-sm { padding: .3rem .7rem; font-size: .72rem; }

    /* ── Dashboard ── */
    .dash { display: none; flex-direction: column; min-height: 100vh; }

    /* Header */
    .dash-head {
      background: var(--dark); border-bottom: 1px solid var(--border);
      padding: .9rem 1.5rem; display: flex; align-items: center; gap: 1.2rem;
      position: sticky; top: 0; z-index: 100;
    }
    .dh-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 3px; color: var(--gold); }
    .dh-sep { width: 1px; height: 20px; background: var(--border2); }
    .dh-clock { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 2px; color: var(--text); }
    .dh-date { font-size: .72rem; color: var(--gray); }
    .dh-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    .dh-badge { font-size: .7rem; letter-spacing: 2px; color: var(--gold); border: 1px solid rgba(212,175,55,.3); padding: .25rem .8rem; text-transform: uppercase; }

    /* Stats */
    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1px; background: var(--border); border-bottom: 1px solid var(--border);
    }
    .stat-c { background: var(--dark); padding: 1.4rem 1.5rem; }
    .stat-c .sl { font-size: .65rem; letter-spacing: 2px; color: var(--gray); text-transform: uppercase; margin-bottom: .4rem; }
    .stat-c .sv { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; line-height: 1; }
    .sv-gold { color: var(--gold); }
    .sv-green { color: var(--green); }
    .sv-yellow { color: var(--yellow); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); background: var(--dark); }
    .tab-btn {
      padding: .9rem 1.8rem; background: none; border: none;
      font-family: inherit; font-size: .78rem; font-weight: 500;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--gray); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all var(--tr);
    }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    /* Filters */
    .filters {
      padding: .9rem 1.5rem; display: flex; flex-wrap: wrap; gap: .75rem;
      align-items: center; border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .filters input, .filters select {
      background: var(--card); border: 1px solid var(--border); color: var(--text);
      padding: .5rem .9rem; font-family: inherit; font-size: .82rem; outline: none;
      transition: border-color var(--tr);
    }
    .filters input:focus, .filters select:focus { border-color: var(--gold); }
    .f-right { margin-left: auto; display: flex; gap: .5rem; align-items: center; }
    .f-ts { font-size: .72rem; color: var(--gray2); }

    /* Table */
    .tbl-wrap { flex: 1; overflow: auto; padding: 1.5rem; }
    .rec-cnt { font-size: .75rem; color: var(--gray2); margin-bottom: .75rem; }
    table { width: 100%; border-collapse: collapse; min-width: 880px; }
    thead th {
      padding: .7rem 1rem; text-align: left;
      font-size: .65rem; text-transform: uppercase; letter-spacing: 2px;
      color: var(--gray2); border-bottom: 1px solid var(--border);
      background: var(--card); white-space: nowrap;
    }
    td {
      padding: .85rem 1rem; border-bottom: 1px solid var(--border);
      vertical-align: middle; font-size: .82rem;
    }
    tr:hover td { background: rgba(255,255,255,.015); }
    .badge { display: inline-block; padding: .22rem .7rem; font-size: .68rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    .badge-p { background: rgba(245,158,11,.12); color: var(--yellow); border: 1px solid rgba(245,158,11,.25); }
    .badge-c { background: rgba(34,197,94,.12);  color: var(--green); border: 1px solid rgba(34,197,94,.25); }
    .badge-x { background: rgba(239,68,68,.08);  color: var(--red);  border: 1px solid rgba(239,68,68,.2); }
    .act-row { display: flex; gap: .35rem; flex-wrap: wrap; }
    .tname { font-weight: 500; }
    .tsub { font-size: .72rem; color: var(--gray); }
    .tprice { color: var(--gold); font-weight: 600; }
    .tdt { white-space: nowrap; }

    /* Clients tab */
    .client-row td { cursor: pointer; }
    .client-row:hover td { background: rgba(212,175,55,.04) !important; }
    .visits { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--gold); }
    .spent  { color: var(--green); font-weight: 600; }

    /* Client detail panel */
    .cd-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: 420px;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 200; padding: 2rem;
      transform: translateX(100%); transition: transform .35s cubic-bezier(.16,1,.3,1);
      overflow-y: auto;
    }
    .cd-panel.open { transform: translateX(0); }
    .cd-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .cd-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; color: var(--gold); }
    .cd-hist { margin-top: 1.5rem; }
    .cd-apt {
      padding: 1rem; border: 1px solid var(--border); margin-bottom: .75rem;
    }
    .cd-apt-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; }
    .cd-svc { font-weight: 500; }
    .cd-meta { font-size: .75rem; color: var(--gray); }

    /* Empty / Loading */
    .empty { text-align: center; padding: 4rem; color: var(--gray); }
    .empty-icon { font-size: 2.5rem; opacity: .3; margin-bottom: .75rem; }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--card); border: 1px solid var(--border);
      padding: .9rem 1.4rem; font-size: .82rem;
      transform: translateY(80px); opacity: 0;
      transition: all .3s; z-index: 9999; max-width: 300px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.ok  { border-color: var(--green); color: var(--green); }
    #toast.err { border-color: var(--red);   color: var(--red); }

    @media (max-width: 768px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .cd-panel { width: 100%; }
      .dh-date { display: none; }
      .filters { padding: .75rem 1rem; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN ── -->
<div class="login" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">MB</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" id="pwdIn" placeholder="Passwort eingeben"
           onkeydown="if(event.key==='Enter') doLogin()">
    <div class="login-err" id="loginErr">Falsches Passwort</div>
    <button class="btn btn-gold btn-full" onclick="doLogin()">Einloggen</button>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div class="dash" id="dashboard">

  <!-- Header -->
  <div class="dash-head">
    <div class="dh-logo">MÜNCHEN BARBER</div>
    <div class="dh-sep"></div>
    <div>
      <div class="dh-clock" id="admTime">—</div>
      <div class="dh-date" id="admDate">—</div>
    </div>
    <div class="dh-right">
      <div class="dh-badge">Admin</div>
      <a href="/" target="_blank" class="btn btn-ghost">Website ↗</a>
      <button class="btn btn-ghost" onclick="doLogout()">Ausloggen</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-c"><div class="sl">Heute</div><div class="sv sv-gold" id="s-today">—</div></div>
    <div class="stat-c"><div class="sl">Diese Woche</div><div class="sv" id="s-week">—</div></div>
    <div class="stat-c"><div class="sl">Gesamt</div><div class="sv" id="s-total">—</div></div>
    <div class="stat-c"><div class="sl">Ausstehend</div><div class="sv sv-yellow" id="s-pend">—</div></div>
    <div class="stat-c"><div class="sl">Kunden</div><div class="sv" id="s-clients">—</div></div>
    <div class="stat-c"><div class="sl">Einnahmen heute</div><div class="sv sv-green" id="s-rev-d">—</div></div>
    <div class="stat-c"><div class="sl">Einnahmen Monat</div><div class="sv sv-green" id="s-rev-m">—</div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('termine', this)">Termine</button>
    <button class="tab-btn" onclick="switchTab('kunden', this)">Kunden</button>
  </div>

  <!-- ── TERMINE TAB ── -->
  <div id="tab-termine">
    <div class="filters">
      <input type="text" id="fSearch" placeholder="🔍 Name oder Telefon" oninput="debounce(loadTermine)" style="width:180px">
      <input type="date" id="fDate" onchange="loadTermine()">
      <select id="fStatus" onchange="loadTermine()">
        <option value="">Alle Status</option>
        <option value="pending">Ausstehend</option>
        <option value="confirmed">Bestätigt</option>
        <option value="cancelled">Abgesagt</option>
      </select>
      <button class="btn btn-ghost" onclick="clearFilters()">Zurücksetzen</button>
      <span class="f-ts" id="fTs">—</span>
      <div class="f-right">
        <button class="btn btn-ghost" onclick="loadTermine()">↻</button>
        <a class="btn btn-ghost" href="/api/admin/export">⬇ CSV</a>
      </div>
    </div>
    <div class="tbl-wrap">
      <div class="rec-cnt" id="rCnt"></div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Kunde</th><th>Service</th><th>Preis</th>
            <th>Datum</th><th>Zeit</th><th>Kontakt</th><th>Status</th><th>Aktionen</th>
          </tr>
        </thead>
        <tbody id="tBody"><tr><td colspan="9" style="text-align:center;padding:3rem"><div class="spinner"></div></td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- ── KUNDEN TAB ── -->
  <div id="tab-kunden" style="display:none">
    <div class="filters">
      <input type="text" id="cSearch" placeholder="🔍 Name oder Telefon" oninput="debounce(loadKunden)" style="width:180px">
      <span class="f-ts" id="cTs">—</span>
      <div class="f-right">
        <button class="btn btn-ghost" onclick="loadKunden()">↻</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <div class="rec-cnt" id="cCnt"></div>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Name</th><th>Telefon</th><th>Besuche</th>
            <th>Abgeschlossen</th><th>Ausgegeben</th><th>Letzter Besuch</th><th>Kontakt</th>
          </tr>
        </thead>
        <tbody id="cBody"><tr><td colspan="8" style="text-align:center;padding:3rem"><div class="spinner"></div></td></tr></tbody>
      </table>
    </div>
  </div>

</div><!-- /dash -->

<!-- Client detail panel -->
<div class="cd-panel" id="cdPanel">
  <div class="cd-head">
    <div id="cdName" class="cd-name">—</div>
    <button class="btn btn-ghost" onclick="closeCd()">✕</button>
  </div>
  <div id="cdInfo" style="font-size:.82rem;color:var(--gray);line-height:1.8"></div>
  <div class="cd-hist" id="cdHist"></div>
</div>
<div class="m-overlay" id="cdOverlay" onclick="closeCd()" style="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;display:none"></div>

<div id="toast"></div>

<script>
// ── Auth ──────────────────────────────────────────────
async function checkAuth() {
  const r = await fetch('/api/admin/check');
  const d = await r.json();
  if (d.authenticated) showDash();
}
async function doLogin() {
  const pwd = document.getElementById('pwdIn').value;
  const r = await fetch('/api/admin/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({password:pwd})
  });
  const d = await r.json();
  if (d.success) showDash();
  else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('pwdIn').value = '';
  }
}
async function doLogout() {
  await fetch('/api/admin/logout', {method:'POST'});
  location.reload();
}
function showDash() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'flex';
  startClock(); loadStats(); loadTermine();
  setInterval(() => { loadStats(); loadTermine(); }, 30000);
}

// ── Clock ──────────────────────────────────────────────
function startClock() {
  const DAYS   = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
  function tick() {
    const n = new Date();
    document.getElementById('admTime').textContent = n.toLocaleTimeString('de-DE');
    document.getElementById('admDate').textContent =
      `${DAYS[n.getDay()]}, ${n.getDate()}. ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  }
  tick(); setInterval(tick, 1000);
}

// ── Stats ──────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/admin/stats');
  if (!r.ok) return;
  const d = await r.json();
  const $ = id => document.getElementById(id);
  $('s-today').textContent   = d.today;
  $('s-week').textContent    = d.week;
  $('s-total').textContent   = d.total;
  $('s-pend').textContent    = d.pending;
  $('s-clients').textContent = d.clients;
  $('s-rev-d').textContent   = d.rev_today + '€';
  $('s-rev-m').textContent   = d.rev_month + '€';
}

// ── Tabs ───────────────────────────────────────────────
function switchTab(name, btn) {
  document.getElementById('tab-termine').style.display = name==='termine' ? 'block' : 'none';
  document.getElementById('tab-kunden').style.display  = name==='kunden'  ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (name==='kunden') loadKunden();
}

// ── Termine ────────────────────────────────────────────
let dTimer;
function debounce(fn) { clearTimeout(dTimer); dTimer = setTimeout(fn, 380); }

async function loadTermine() {
  const search = document.getElementById('fSearch').value;
  const date   = document.getElementById('fDate').value;
  const status = document.getElementById('fStatus').value;
  const p = new URLSearchParams();
  if (search) p.set('search', search);
  if (date)   p.set('date', date);
  if (status) p.set('status', status);

  const body = document.getElementById('tBody');
  body.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>`;

  const r = await fetch('/api/admin/appointments?' + p);
  if (!r.ok) return;
  const d = await r.json();
  renderTermine(d.appointments);
  document.getElementById('fTs').textContent =
    `${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} · ${d.appointments.length} Termine`;
}

function renderTermine(list) {
  const body = document.getElementById('tBody');
  document.getElementById('rCnt').textContent = list.length ? `${list.length} Ergebnisse` : '';
  if (!list.length) {
    body.innerHTML = `<tr><td colspan="9"><div class="empty"><div class="empty-icon">📋</div><div>Keine Termine gefunden</div></div></td></tr>`;
    return;
  }
  const badge = s => ({
    pending:   '<span class="badge badge-p">Ausstehend</span>',
    confirmed: '<span class="badge badge-c">Bestätigt</span>',
    cancelled: '<span class="badge badge-x">Abgesagt</span>',
  }[s] || s);

  body.innerHTML = list.map(a => {
    const acts = [];
    if (a.status==='pending') {
      acts.push(`<button class="btn btn-sm btn-green" onclick="setStatus(${a.id},'confirmed')">✓</button>`);
      acts.push(`<button class="btn btn-sm btn-red" onclick="setStatus(${a.id},'cancelled')">✕</button>`);
    }
    if (a.status==='confirmed') {
      acts.push(`<button class="btn btn-sm btn-red" onclick="setStatus(${a.id},'cancelled')">✕</button>`);
    }
    if (a.status!=='cancelled') {
      acts.push(`<button class="btn btn-sm btn-blue" onclick="remind(${a.id})">📱</button>`);
    }
    const contact = [
      a.email ? `<div class="tsub">${esc(a.email)}</div>` : '',
      a.telegram ? `<div class="tsub">${esc(a.telegram)}</div>` : '',
    ].join('');
    return `<tr>
      <td style="color:var(--gray2)">${a.id}</td>
      <td><div class="tname">${esc(a.name)}</div>${a.comment?`<div class="tsub">${esc(a.comment)}</div>`:''}</td>
      <td>${esc(a.service)}</td>
      <td class="tprice">${a.price}€</td>
      <td class="tdt"><div>${a.date}</div></td>
      <td class="tdt"><div class="tname">${a.time}</div></td>
      <td><div>${esc(a.phone)}</div>${contact}</td>
      <td>${badge(a.status)}</td>
      <td><div class="act-row">${acts.join('')}</div></td>
    </tr>`;
  }).join('');
}

// ── Kunden ─────────────────────────────────────────────
let allClients = [];
async function loadKunden() {
  const body = document.getElementById('cBody');
  body.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem"><div class="spinner"></div></td></tr>`;
  const r = await fetch('/api/admin/clients');
  if (!r.ok) return;
  const d = await r.json();
  allClients = d.clients;
  renderKunden(allClients);
  document.getElementById('cTs').textContent =
    `${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} · ${d.clients.length} Kunden`;
}

function renderKunden(list) {
  const body = document.getElementById('cBody');
  const q = (document.getElementById('cSearch')?.value || '').toLowerCase();
  const filtered = q ? list.filter(c => (c.name+c.phone).toLowerCase().includes(q)) : list;
  document.getElementById('cCnt').textContent = filtered.length ? `${filtered.length} Kunden` : '';
  if (!filtered.length) {
    body.innerHTML = `<tr><td colspan="8"><div class="empty"><div class="empty-icon">👤</div><div>Keine Kunden gefunden</div></div></td></tr>`;
    return;
  }
  body.innerHTML = filtered.map((c, i) => {
    const contact = [
      c.email ? `<div class="tsub">${esc(c.email)}</div>` : '',
      c.telegram ? `<div class="tsub">${esc(c.telegram)}</div>` : '',
    ].join('');
    return `<tr class="client-row" onclick="openCd('${esc(c.phone)}')">
      <td style="color:var(--gray2)">${i+1}</td>
      <td class="tname">${esc(c.name)}</td>
      <td>${esc(c.phone)}</td>
      <td><span class="visits">${c.total_bookings}</span></td>
      <td>${c.completed}</td>
      <td class="spent">${c.total_spent}€</td>
      <td class="tdt">${c.last_date || '—'}</td>
      <td>${contact}</td>
    </tr>`;
  }).join('');
}

document.getElementById('cSearch')?.addEventListener('input', () => {
  debounce(() => renderKunden(allClients));
});

// ── Client detail ──────────────────────────────────────
async function openCd(phone) {
  const panel   = document.getElementById('cdPanel');
  const overlay = document.getElementById('cdOverlay');
  panel.classList.add('open');
  overlay.style.display = 'block';
  document.getElementById('cdName').textContent = '…';
  document.getElementById('cdInfo').textContent = '';
  document.getElementById('cdHist').innerHTML = '<div class="spinner"></div>';

  const r = await fetch(`/api/admin/client/${encodeURIComponent(phone)}`);
  const d = await r.json();
  const hist = d.history || [];
  if (!hist.length) { closeCd(); return; }

  const c = hist[0];
  document.getElementById('cdName').textContent = c.name;
  document.getElementById('cdInfo').innerHTML =
    `📞 ${c.phone}` +
    (c.email    ? `<br>📧 ${c.email}` : '') +
    (c.telegram ? `<br>📱 ${c.telegram}` : '') +
    `<br><br>Buchungen gesamt: <strong>${hist.length}</strong>` +
    `<br>Ausgegeben: <strong style="color:var(--green)">${hist.filter(h=>h.status==='confirmed').reduce((s,h)=>s+h.price,0)}€</strong>`;

  document.getElementById('cdHist').innerHTML = '<div style="font-size:.7rem;letter-spacing:2px;color:var(--gray2);text-transform:uppercase;margin-bottom:1rem">Terminhistorie</div>' +
    hist.map(h => `
      <div class="cd-apt">
        <div class="cd-apt-top">
          <span class="cd-svc">${esc(h.service)}</span>
          <span class="tprice">${h.price}€</span>
        </div>
        <div class="cd-meta">${h.date} · ${h.time} · ${{pending:'⏳ Ausstehend',confirmed:'✅ Bestätigt',cancelled:'❌ Abgesagt'}[h.status]||h.status}</div>
        ${h.comment ? `<div class="cd-meta" style="margin-top:.3rem">💬 ${esc(h.comment)}</div>` : ''}
      </div>`).join('');
}
function closeCd() {
  document.getElementById('cdPanel').classList.remove('open');
  document.getElementById('cdOverlay').style.display = 'none';
}

// ── Actions ─────────────────────────────────────────────
async function setStatus(id, status) {
  const r = await fetch(`/api/admin/appointments/${id}`, {
    method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({status})
  });
  const d = await r.json();
  if (d.success) { toast('✓ Status aktualisiert', 'ok'); loadTermine(); loadStats(); }
  else toast('Fehler', 'err');
}
async function remind(id) {
  const r = await fetch(`/api/admin/remind/${id}`, {method:'POST'});
  const d = await r.json();
  toast(d.message || (d.success ? '✓ Erinnerung gesendet' : '✕ Fehler'), d.success ? 'ok' : 'err');
}
function clearFilters() {
  ['fSearch','fDate','fStatus'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  loadTermine();
}

// ── Utils ────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
let toastT;
function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(toastT);
  toastT = setTimeout(() => el.className = '', 3200);
}

// ── Init ─────────────────────────────────────────────────
checkAuth();
</script>
</body>
</html>
