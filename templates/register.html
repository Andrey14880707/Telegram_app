<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrieren — München Barber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@400;500&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #FFFFFF;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-top: 2px solid #111111;
      border-radius: 4px;
      padding: 2.8rem 2.4rem 2.4rem;
      position: relative;
      box-shadow: 0 2px 20px rgba(0,0,0,0.07);
    }
    .auth-card::before, .auth-card::after { display: none; }
    .auth-corner-br { display: none; }
    .auth-logo {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .auth-logomark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border: 1.5px solid #E5E5E5;
      border-radius: 50%;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 2px;
      color: #111111;
      background: #F5F4F2;
      margin-bottom: .9rem;
    }
    .auth-logomark::before { display: none; }
    .auth-site-name {
      font-family: 'DM Mono', monospace;
      font-size: .68rem;
      letter-spacing: 3px;
      color: rgba(17,17,17,.35);
      text-transform: uppercase;
    }
    .auth-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: #111111;
      text-align: center;
      margin-bottom: .4rem;
      line-height: 1.2;
    }
    .auth-sub {
      font-size: .78rem;
      color: rgba(17,17,17,.4);
      text-align: center;
      margin-bottom: 1.8rem;
      font-family: 'DM Mono', monospace;
    }
    .auth-sep {
      height: 1px;
      background: #E5E5E5;
      margin-bottom: 1.6rem;
    }
    .auth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .9rem;
    }
    @media(max-width:480px) { .auth-row { grid-template-columns: 1fr; } }
    .auth-field { margin-bottom: 1rem; }
    .auth-field label {
      display: block;
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(17,17,17,.45);
      margin-bottom: .4rem;
      font-family: 'DM Mono', monospace;
    }
    .auth-field label small {
      font-size: .65rem;
      color: rgba(17,17,17,.3);
      letter-spacing: 0;
      text-transform: none;
    }
    .auth-field input {
      width: 100%;
      background: #FAFAFA;
      border: 1px solid #E5E5E5;
      border-radius: 6px;
      padding: .75rem 1rem;
      color: #111111;
      font-family: 'Figtree', sans-serif;
      font-size: .88rem;
      transition: border-color .3s, box-shadow .3s;
      outline: none;
    }
    .auth-field input:focus {
      border-color: #111111;
      background: #FFFFFF;
      box-shadow: 0 0 0 3px rgba(17,17,17,.07);
    }
    .auth-field input::placeholder { color: rgba(17,17,17,.28); }

    /* password strength bar */
    .pass-strength {
      height: 3px;
      border-radius: 2px;
      background: #EEEEEE;
      margin-top: .4rem;
      overflow: hidden;
    }
    .pass-strength-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width .3s, background .3s;
    }
    .auth-hint { font-size: .7rem; color: rgba(17,17,17,.35); margin-top: .3rem; }

    .auth-btn {
      width: 100%;
      margin-top: 1.4rem;
      padding: .9rem 1.5rem;
      background: #111111;
      color: #FFFFFF;
      border: none;
      border-radius: 6px;
      font-family: 'Figtree', sans-serif;
      font-size: .88rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .25s, transform .25s;
    }
    .auth-btn:hover { background: #333333; transform: translateY(-1px); }
    .auth-btn:active { transform: translateY(0); }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .auth-err {
      display: none;
      background: rgba(220,38,38,.06);
      border: 1px solid rgba(220,38,38,.25);
      border-left: 3px solid #dc2626;
      border-radius: 6px;
      padding: .7rem 1rem;
      font-size: .8rem;
      color: #dc2626;
      margin-top: 1rem;
    }
    .auth-err.show { display: block; }
    .auth-links {
      text-align: center;
      margin-top: 1.6rem;
      font-size: .8rem;
      color: rgba(17,17,17,.38);
    }
    .auth-links a {
      color: #111111;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: opacity .2s;
    }
    .auth-links a:hover { opacity: .6; }
    .auth-back {
      display: inline-flex;
      align-items: center; gap: .4rem;
      font-size: .68rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(17,17,17,.35);
      text-decoration: none;
      font-family: 'DM Mono', monospace;
      transition: color .2s;
      margin-bottom: 2rem;
    }
    .auth-back:hover { color: #111111; }
    .auth-back-wrap { text-align: center; }
    .auth-perks {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-bottom: 1.4rem;
      justify-content: center;
    }
    .auth-perk {
      font-size: .68rem;
      padding: .3rem .7rem;
      border: 1px solid #E5E5E5;
      border-radius: 99px;
      color: rgba(17,17,17,.55);
      font-family: 'DM Mono', monospace;
      background: #FAFAFA;
    }
  </style>
</head>
<body>
<div class="auth-page">
  <div style="width:100%;max-width:460px">

    <div class="auth-back-wrap">
      <a href="/" class="auth-back">← München Barber</a>
    </div>

    <div class="auth-card">
      <div class="auth-corner-br"></div>

      <div class="auth-logo">
        <div class="auth-logomark">MB</div>
        <div class="auth-site-name">München Barber</div>
      </div>

      <h1 class="auth-title">Konto erstellen</h1>
      <p class="auth-sub">> Online buchen · Termine verwalten</p>

      <div class="auth-perks">
        <span class="auth-perk">✂ Online buchen</span>
        <span class="auth-perk">📅 Termine sehen</span>
        <span class="auth-perk">🔔 Erinnerungen</span>
      </div>

      <div class="auth-sep"></div>

      <form id="regForm" novalidate>
        <div class="auth-row">
          <div class="auth-field">
            <label>Name *</label>
            <input type="text" id="rName" placeholder="Max Mustermann" autocomplete="name" required>
          </div>
          <div class="auth-field">
            <label>Telefon *</label>
            <input type="tel" id="rPhone" placeholder="+49 123 456 7890" autocomplete="tel" required>
          </div>
        </div>
        <div class="auth-row">
          <div class="auth-field">
            <label>E-Mail <small>(optional)</small></label>
            <input type="email" id="rEmail" placeholder="email@example.com" autocomplete="email">
          </div>
          <div class="auth-field">
            <label>Telegram <small>(optional)</small></label>
            <input type="text" id="rTelegram" placeholder="@username">
          </div>
        </div>
        <div class="auth-field">
          <label>Passwort *</label>
          <input type="password" id="rPass" placeholder="Mindestens 6 Zeichen" autocomplete="new-password" required>
          <div class="pass-strength"><div class="pass-strength-fill" id="passFill"></div></div>
          <div class="auth-hint" id="passHint">Mindestens 6 Zeichen</div>
        </div>
        <div class="auth-field">
          <label>Passwort bestätigen *</label>
          <input type="password" id="rPassC" placeholder="Passwort wiederholen" autocomplete="new-password" required>
        </div>

        <button type="submit" class="auth-btn" id="regBtn">Registrieren & einloggen ✂</button>
        <div class="auth-err" id="regErr"></div>
      </form>

      <div class="auth-links">
        Bereits ein Konto? <a href="/login">Jetzt anmelden →</a>
      </div>
    </div>
  </div>
</div>

<script>
  // Password strength indicator
  const passInput = document.getElementById('rPass');
  const passFill  = document.getElementById('passFill');
  const passHint  = document.getElementById('passHint');
  passInput.addEventListener('input', () => {
    const v = passInput.value;
    let score = 0;
    if (v.length >= 6)  score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^a-zA-Z0-9]/.test(v)) score++;
    const colors = ['#dc2626','#f97316','#eab308','#22c55e','#16a34a'];
    const labels = ['Zu kurz','Schwach','Mittel','Stark','Sehr stark'];
    const pct    = [20, 40, 60, 80, 100];
    passFill.style.width      = pct[Math.min(score, 4)] + '%';
    passFill.style.background = colors[Math.min(score, 4)];
    passHint.textContent      = v.length < 6 ? 'Mindestens 6 Zeichen' : labels[Math.min(score, 4)];
  });

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('regBtn');
    const err = document.getElementById('regErr');
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Wird registriert...';

    try {
      const res  = await fetch('/api/client/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:     document.getElementById('rName').value.trim(),
          phone:    document.getElementById('rPhone').value.trim(),
          email:    document.getElementById('rEmail').value.trim(),
          telegram: document.getElementById('rTelegram').value.trim(),
          password: document.getElementById('rPass').value,
          confirm:  document.getElementById('rPassC').value,
        }),
      });
      const data = await res.json();
      if (data.success) {
        location.href = '/#termin';
      } else {
        err.textContent = '⚠ ' + data.error;
        err.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Registrieren & einloggen ✂';
      }
    } catch {
      err.textContent = '⚠ Verbindungsfehler — bitte erneut versuchen';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Registrieren & einloggen ✂';
    }
  });
</script>
</body>
</html>
